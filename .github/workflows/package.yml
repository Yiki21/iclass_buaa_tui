name: Package

on:
  push:
    tags:
      - "Build*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-macos:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-latest
            arch: arm64
          - runner: macos-15-intel
            arch: x64

    runs-on: ${{ matrix.runner }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-packager
        run: cargo install cargo-packager --locked

      - name: Build macOS package
        run: cargo packager --release

      - name: Prepare macOS artifact
        run: |
          mkdir -p dist
          package_path=$(find target/packager -maxdepth 1 -name '*.dmg' -print -quit)
          cp "$package_path" "dist/iclass_buaa_tui-macos-${{ matrix.arch }}.dmg"

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v7
        with:
          name: macos-${{ matrix.arch }}-${{ github.ref_name }}
          path: dist/*.dmg
          if-no-files-found: error

  build-windows:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: windows-latest
            arch: x64
          - runner: windows-11-arm
            arch: arm64

    runs-on: ${{ matrix.runner }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --release --locked

      - name: Prepare exe artifact
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item target/release/iclass_buaa_tui.exe "dist/iclass_buaa_tui-windows-${{ matrix.arch }}.exe"

      - name: Upload exe artifact
        uses: actions/upload-artifact@v7
        with:
          name: windows-exe-${{ matrix.arch }}-${{ github.ref_name }}
          path: dist/*.exe
          if-no-files-found: error

  build-deb:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            arch: amd64
          - runner: ubuntu-24.04-arm
            arch: arm64

    runs-on: ${{ matrix.runner }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Install deb packaging dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y dpkg-dev

      - name: Install deb packaging tool
        run: |
          cargo install cargo-deb --locked --no-default-features

      - name: Build release binary
        run: cargo build --release --locked

      - name: Build deb package
        run: cargo deb --no-build --no-strip

      - name: Upload deb artifact
        uses: actions/upload-artifact@v7
        with:
          name: deb-${{ matrix.arch }}-${{ github.ref_name }}
          path: target/debian/*.deb
          if-no-files-found: error

  build-rpm:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            arch: x86_64
          - runner: ubuntu-24.04-arm
            arch: aarch64

    runs-on: ${{ matrix.runner }}
    container:
      image: fedora:42

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install system dependencies
        run: |
          dnf install -y \
            gcc \
            git \
            rpm-build \
          && dnf clean all

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Install rpm packaging tool
        run: cargo install cargo-generate-rpm --locked

      - name: Build release binary
        run: cargo build --release --locked

      - name: Build rpm package
        run: cargo generate-rpm

      - name: Upload rpm artifact
        uses: actions/upload-artifact@v7
        with:
          name: rpm-${{ matrix.arch }}-${{ github.ref_name }}
          path: target/generate-rpm/*.rpm
          if-no-files-found: error

  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs:
      - build-macos
      - build-windows
      - build-deb
      - build-rpm
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v7
        with:
          path: release-artifacts

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            release-artifacts/**/*.dmg
            release-artifacts/**/*.exe
            release-artifacts/**/*.deb
            release-artifacts/**/*.rpm
